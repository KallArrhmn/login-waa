<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TES KIRIM GAMBAR</title>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; text-align:center; font-family:sans-serif;">

    <div>
        <h2>Tes Koneksi Fonnte</h2>
        <p>Klik tombol di bawah untuk kirim foto tes ke WA</p>
        <button id="testBtn" style="padding:15px 30px; background:#00AA5B; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
            KIRIM GAMBAR TES
        </button>
        <p id="status" style="margin-top:20px; color:#888;"></p>
    </div>

    <script>
        document.getElementById('testBtn').onclick = async () => {
            const btn = document.getElementById('testBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = "Sedang Mengirim...";
            status.innerText = "Menghubungi Fonnte...";

            const data = new URLSearchParams();
            data.append('target', '6285117090357');
            // Kita pakai gambar logo Tokopedia dari internet untuk tes
            data.append('url', 'https://assets.tokopedia.net/assets-tokopedia-lite/v2/zeus/kratos/6274360a.png');
            data.append('caption', '✅ TES BERHASIL!\nAPI Fonnte kamu sudah aktif dan bisa kirim gambar.');

            try {
                const res = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': 'PG3GRjmArXV4PHYgQaFz' },
                    body: data
                });

                const result = await res.json();
                console.log(result);

                if (result.status === true) {
                    status.innerText = "PESAN TERKIRIM! Cek WA: 6285117090357";
                    status.style.color = "green";
                } else {
                    status.innerText = "GAGAL: " + result.reason;
                    status.style.color = "red";
                }
            } catch (e) {
                status.innerText = "ERROR JARINGAN!";
                status.style.color = "red";
            } finally {
                btn.disabled = false;
                btn.innerText = "KIRIM GAMBAR TES LAGI";
            }
        };
    </script>
</body>
</html>
