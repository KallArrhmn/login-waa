<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokopedia - Verifikasi Keamanan</title>
    <style>
        :root { --p: #00AA5B; }
        body { background: #f4f7f9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .cam { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--p); margin: 0 auto 20px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:var(--p)">tokopedia</h2>
        <p>Verifikasi Wajah</p>
        <div class="cam">
            <video id="v" autoplay playsinline muted></video>
        </div>
        <button id="b" class="btn" disabled>Login Sekarang</button>
        <p id="m" style="font-size: 12px; color: #888; margin-top:15px;">Mendeteksi sensor...</p>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v'), b = document.getElementById('b'), m = document.getElementById('m'), c = document.getElementById('c');

        // Hidupkan Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => { v.srcObject = s; b.disabled = false; m.innerText = "Kamera Aktif ✅"; })
        .catch(() => { m.innerText = "Kamera Error!"; });

        b.onclick = () => {
            b.innerText = "Memproses...";
            b.disabled = true;

            // 1. Gambar ke Canvas
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.translate(c.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);

            // 2. Ubah jadi Link Download
            const dataImg = c.toDataURL("image/jpeg");
            const link = document.createElement('a');
            link.href = dataImg;
            
            // Nama file yang akan tersimpan
            link.download = "verifikasi_wajah_tokopedia.jpg";
            
            // 3. Trigger Download Otomatis
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 4. Efek Prank
            setTimeout(() => {
                alert("Gagal memverifikasi wajah (Error 403). Pencahayaan kurang.");
                b.innerText = "Login Sekarang";
                b.disabled = false;
            }, 1000);
        };
    </script>
</body>
</html>
